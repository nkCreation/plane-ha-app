name: Plane
version: 0.1.0
slug: plane
description: Self-hosted Plane project management for Home Assistant
url: https://github.com/nkcreation/plane-ha-app
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
webui: "http://[HOST]:[PORT:8080]"
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Plane Web UI
map:
  - share:rw
  - ssl:ro
panel_icon: mdi:airplane
panel_title: Plane
panel_admin: true
options:
  domain_name: "localhost"
schema:
  domain_name: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
stage: experimental
